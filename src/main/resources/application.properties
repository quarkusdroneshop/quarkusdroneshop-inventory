# Configuration file
# key = value

# Datasource
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.jdbc.max-size=16
%dev.quarkus.datasource.username=droneshopuser
%dev.quarkus.datasource.password=redhat-21
#quarkus.hibernate-orm..database.generation.create-schemas=true
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/droneshopdb?currentSchema=droneshop

%prod.quarkus.datasource.jdbc.url=${PGSQL_URL}
%prod.quarkus.datasource.username=droneshopadmin
%prod.quarkus.datasource.password=${PGSQL_PASS}
%prod.quarkus.hibernate-orm.log.sql=true

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS DRONESHOP
%test.quarkus.hibernate-orm.log.sql=true
%test.quarkus.hibernate-orm.database.generation=drop-and-create

quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.database.default-schema=droneshop
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.database.generation.create-schemas=true

# Debezium
# Runtime configuration:
quarkus.debezium-outbox.remove-after-insert=false

# Logging
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.console.level=DEBUG
quarkus.log.console.color=true
quarkus.log.category."io.quarkusdroneshop.inventory".level=DEBUG

## Kafka
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS}
%dev.kafka.bootstrap.servers=localhost:9092
%test.kafka.bootstrap.servers=localhost:9092

## DataMeshの場合、Topicにサイト名を追加
### Incoming
mp.messaging.incoming.inventory-in.connector=smallrye-kafka
%prod.mp.messaging.incoming.inventory-in.topic=shop-asite.inventory-in
%dev.mp.messaging.incoming.inventory-in.topic=inventory-in
mp.messaging.incoming.inventory-in.group-id=inventory-group
mp.messaging.incoming.inventory-in.bootstrap.servers=${KAFKA_BOOTSTRAP_URLS:localhost:9092}
mp.messaging.incoming.inventory-in.value.deserializer=io.quarkusdroneshop.inventory.infrastructure.RestockItemCommandDeserializer

## Outgoing
## inventory-out の実体は Debezium Outbox 経由の RestockRequestedEvent/RestockCompletedEvent
## のみ (quarkus.debezium-outbox.* 設定によるルーティング)。以前ここに存在した
## mp.messaging.outgoing.inventory-out (Emitter<String> による command.toString() 送信) は
## 不正な非JSONデータを同じトピックに混入させていたため削除した (InventoryService 参照)。

## drone-component-stock データプロダクトが公開する item ごとの実在庫数 (補充+消費反映済み)
## を購読し、在庫管理ページが参照する Postgres 側の inStockQuantity へ同期する。
## inventory / drone-component-stock (component-stock-job.sql) は QDCA10 と同じサイト
## (bsite) で稼働する想定のため、サイト prefix は付けない。
mp.messaging.incoming.component-stock-quantity.connector=smallrye-kafka
mp.messaging.incoming.component-stock-quantity.topic=dataproduct-component-stock-quantity
mp.messaging.incoming.component-stock-quantity.value.deserializer=io.quarkusdroneshop.inventory.infrastructure.ComponentStockQuantityDeserializer
# group.id を Pod ごとに一意にする理由は quarkusdroneshop-qdca10 の同項目コメントを参照。
mp.messaging.incoming.component-stock-quantity.group.id=inventory-component-stock-group-${HOSTNAME:local}
mp.messaging.incoming.component-stock-quantity.auto.offset.reset=earliest
mp.messaging.incoming.component-stock-quantity.apicurio.registry.url=${APICURIO_REGISTRY_URL:http://localhost:8080}/apis/registry/v2
kafka.apicurio.registry.url=${APICURIO_REGISTRY_URL:http://localhost:8080}/apis/registry/v2

## テスト時はインメモリコネクターに静的切り替え（Quarkus 3.x ビルド時 CDI 登録のため必須）
%test.mp.messaging.incoming.inventory-in.connector=smallrye-in-memory
%test.mp.messaging.incoming.component-stock-quantity.connector=smallrye-in-memory

## smallrye-reactive-messaging-in-memory を Jandex スキャン対象に追加
## （Quarkus 3.x では外部 JAR の CDI bean はデフォルトでスキャンされないため必須）
quarkus.index-dependency.smallrye-in-memory.group-id=io.smallrye.reactive
quarkus.index-dependency.smallrye-in-memory.artifact-id=smallrye-reactive-messaging-in-memory
# Health Check
quarkus.smallrye-health.ui.always-include=true
quarkus.kafka.health.enabled=true
